            background-color: #121212;

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #444;
            padding: 2px 5px;
            text-align: center;
            height: 28px;
        }
        th {
            background-color: #2d2d2d;
            color: white;
        }
        tr:nth-child(even) {

        }
        tr:nth-child(odd) {
            background-color: #2d2d2d;
        }
        .highlight {
            background-color: #4CAF50 !important;
            color: white;
        }
        .total-row {
            background-color: #7CB342;
            color: white;
            font-weight: bold;
        }
        .negative {
            color: #FF5252;
            font-weight: bold;
        }
        .positive {
            color: #4CAF50;
            font-weight: bold;
        }
        input[type="number"] {
            width: 60px;
            padding: 5px;
            border: none;
            background-color: transparent;
            color: white;
            text-align: center;
        }
        input[type="number"]:focus {
            outline: none;
            background-color: #333;
        }
        .header {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .first-place {

            color: #FFD700;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 215, 0, 0.5);

        .save-button {

            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .save-button:hover {

    <script>
        // 获取所有玩家
        const players = ['IF', 'ZSL', '郑朝北', '周先生'];
        
        // 计算每个玩家的总下注金额和理论奖金
        function calculateTotals() {
            let totalNet = 0;
            
            players.forEach(player => {
                // 计算总下注金额
                const betSum = document.getElementById(`${player}-bet-sum`);
                const betAmounts = document.querySelectorAll(`tr:nth-child(2n+1) .bet-amount[data-player="${player}"]`);
                let sumBet = 0;
                betAmounts.forEach(input => {
                    if (input.value) {
                        sumBet += parseFloat(input.value);
                    }
                });
                betSum.textContent = sumBet.toFixed(1);
                
                // 计算总理论奖金
                const prizeSum = document.getElementById(`${player}-prize-sum`);
                const prizeAmounts = document.querySelectorAll(`tr:nth-child(2n) .prize-amount[data-player="${player}"]`);
                let sumPrize = 0;
                prizeAmounts.forEach(input => {
                    if (input.value) {
                        sumPrize += parseFloat(input.value);
                    }
                });
                prizeSum.textContent = sumPrize.toFixed(1);
                
                // 计算净收益
                const netProfit = document.getElementById(`${player}-profit`);
                const net = sumPrize - sumBet;
                netProfit.textContent = net.toFixed(1);
                
                // 更新总净收益
                totalNet += net;
                
                // 设置颜色
                if (net > 0) {
                    netProfit.classList.remove('negative');
                    netProfit.classList.add('positive');
                } else {
                    netProfit.classList.remove('positive');
                    netProfit.classList.add('negative');
                }
            });
            
            // 更新总净收益
            document.getElementById('total-net').textContent = totalNet.toFixed(1);
            
            // 排名并高亮第一名
            rankPlayers();
        }
        
        // 排名并高亮第一名
        function rankPlayers() {
            // 获取所有玩家的净收益
            const playerData = players.map(player => {
                const netElement = document.getElementById(`${player}-profit`);
                const netValue = parseFloat(netElement.textContent);
                return { player, netValue };
            });
            
            // 按净收益降序排序
            playerData.sort((a, b) => b.netValue - a.netValue);
            
            // 移除之前的高亮
            document.querySelectorAll('tr').forEach(tr => {
                tr.classList.remove('highlight');
            });
            
            // 显示第一名
            if (playerData.length > 0) {
                const firstPlayer = playerData[0].player;
                const firstPlaceDisplay = document.getElementById('firstPlaceDisplay');
                firstPlaceDisplay.textContent = `第一名是${firstPlayer}`;
                
                // 高亮第一名的行
                const firstRow = document.querySelector(`tr[data-player="${firstPlayer}"]`);
                if (firstRow) {
                    firstRow.classList.add('highlight');
                }
            }
        }
        
        // 监听输入变化
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('bet-amount') || e.target.classList.contains('prize-amount')) {
                calculateTotals();
            }
        });
        
        // 保存数据功能
        function saveData() {
            // 创建一个新的表格元素用于导出
            const exportTable = document.getElementById('competitionTable').cloneNode(true);
            
            // 移除所有输入框，替换为实际值
            const inputs = exportTable.querySelectorAll('input');
            inputs.forEach(input => {
                const value = input.value || '0';
                const td = document.createElement('td');
                td.textContent = value;
                td.style.textAlign = 'center';
                input.parentNode.replaceWith(td);
            });
            
            // 获取当前日期时间作为文件名
            const now = new Date();
            const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
            
            // 构建HTML内容
            const htmlContent = `<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>争霸世界杯 - 数据备份 ${timestamp}</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #444; padding: 2px 5px; text-align: center; height: 28px; }
        th { background-color: #2d2d2d; color: white; }
        tr:nth-child(even) { background-color: #1e1e1e; }
        tr:nth-child(odd) { background-color: #2d2d2d; }
        .total-row { background-color: #7CB342; color: white; font-weight: bold; }
        .negative { color: #FF5252; font-weight: bold; }
        .positive { color: #4CAF50; font-weight: bold; }
        .header { text-align: center; font-size: 24px; margin-bottom: 20px; }
        .first-place { text-align: center; font-size: 32px; color: #FFD700; font-weight: bold; margin-bottom: 10px; }
        .note { background-color: #000; padding: 10px; margin-top: 20px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        ${document.getElementById('firstPlaceDisplay').outerHTML}
        <div class="header">争霸世界杯</div>
        ${exportTable.outerHTML}
        <div class="note">备注：每天下注时间截止到晚上八点</div>
        <div style="margin-top: 20px; color: #aaa; font-size: 12px;">数据保存时间：${now.toLocaleString('zh-CN')}</div>
    </div>
</body>
</html>`;
            
            // 创建Blob并下载
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `争霸世界杯_${timestamp}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('数据已保存！文件名为：争霸世界杯_' + timestamp + '.html');
        }

        // 页面加载完成后初始化
        window.onload = function() {
