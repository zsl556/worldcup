    <script>
        // GitHub 配置
        const GITHUB_OWNER = 'zsl556';  // 你的 GitHub 用户名
        const GITHUB_REPO = 'worldcup';  // 仓库名称
        const DATA_FILE_PATH = 'data/worldcup-data.json';  // 数据文件路径
        const GITHUB_TOKEN = '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';  // GitHub Personal Access Token
        
        // 获取所有玩家
        const players = ['IF', 'ZSL', '郑朝北', '周先生'];
        
        // 计算每个玩家的总下注金额和理论奖金
        function calculateTotals() {
            let totalNet = 0;
            
            players.forEach(player => {
                // 计算总下注金额
                const betSum = document.getElementById(`${player}-bet-sum`);
                const betAmounts = document.querySelectorAll(`tr:nth-child(2n+1) .bet-amount[data-player="${player}"]`);
                let sumBet = 0;
                betAmounts.forEach(input => {
                    if (input.value) {
                        sumBet += parseFloat(input.value);
                    }
                });
                betSum.textContent = sumBet.toFixed(1);
                
                // 计算总理论奖金
                const prizeSum = document.getElementById(`${player}-prize-sum`);
                const prizeAmounts = document.querySelectorAll(`tr:nth-child(2n) .prize-amount[data-player="${player}"]`);
                let sumPrize = 0;
                prizeAmounts.forEach(input => {
                    if (input.value) {
                        sumPrize += parseFloat(input.value);
                    }
                });
                prizeSum.textContent = sumPrize.toFixed(1);
                
                // 计算净收益
                const netProfit = document.getElementById(`${player}-profit`);
                const net = sumPrize - sumBet;
                netProfit.textContent = net.toFixed(1);
                
                // 更新总净收益
                totalNet += net;
                
                // 设置颜色
                if (net > 0) {
                    netProfit.classList.remove('negative');
                    netProfit.classList.add('positive');
                } else {
                    netProfit.classList.remove('positive');
                    netProfit.classList.add('negative');
                }
            });
            
            // 更新总净收益
            document.getElementById('total-net').textContent = totalNet.toFixed(1);
            
            // 排名并高亮第一名
            rankPlayers();
        }
        
        // 排名并高亮第一名
        function rankPlayers() {
            // 获取所有玩家的净收益
            const playerData = players.map(player => {
                const netElement = document.getElementById(`${player}-profit`);
                const netValue = parseFloat(netElement.textContent);
                return { player, netValue };
            });
            
            // 按净收益降序排序
            playerData.sort((a, b) => b.netValue - a.netValue);
            
            // 移除之前的高亮
            document.querySelectorAll('tr').forEach(tr => {
                tr.classList.remove('highlight');
            });
            
            // 显示第一名
            if (playerData.length > 0) {
                const firstPlayer = playerData[0].player;
                const firstPlaceDisplay = document.getElementById('firstPlaceDisplay');
                firstPlaceDisplay.textContent = `第一名是${firstPlayer}`;
                
                // 高亮第一名的行
                const firstRow = document.querySelector(`tr[data-player="${firstPlayer}"]`);
                if (firstRow) {
                    firstRow.classList.add('highlight');
                }
            }
        }
        
        // 监听输入变化
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('bet-amount') || e.target.classList.contains('prize-amount')) {
                calculateTotals();
            }
        });
        
        // 保存数据功能

            // 创建一个新的表格元素用于导出
            const exportTable = document.getElementById('competitionTable').cloneNode(true);
            
            // 移除所有输入框，替换为实际值
            const inputs = exportTable.querySelectorAll('input');
            inputs.forEach(input => {
                const value = input.value || '0';
                const td = document.createElement('td');
                td.textContent = value;
                td.style.textAlign = 'center';

            });

            // 构建HTML内容

        .first-place { text-align: center; font-size: 32px; color: #FFD700; font-weight: bold; margin-bottom: 10px; }
        .note { background-color: #000; padding: 10px; margin-top: 20px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        ${document.getElementById('firstPlaceDisplay').outerHTML}
        <div class="header">争霸世界杯</div>
        ${exportTable.outerHTML}
        <div class="note">备注：每天下注时间截止到晚上八点</div>
        <div style="margin-top: 20px; color: #aaa; font-size: 12px;">数据保存时间：${now.toLocaleString('zh-CN')}</div>
    </div>
</body>
</html>`;
            
            // 创建Blob并下载
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `争霸世界杯_${timestamp}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('数据已保存！文件名为：争霸世界杯_' + timestamp + '.html');
        }
        
        // 显示状态消息
        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message status-' + type;
            statusEl.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }
        
        // 收集当前表格数据
        function collectTableData() {
            const data = {
                timestamp: new Date().toISOString(),
                players: {}
            };
            
            players.forEach(player => {
                data.players[player] = {
                    bets: {},
                    prizes: {},
                    betSum: document.getElementById(`${player}-bet-sum`).textContent,
                    prizeSum: document.getElementById(`${player}-prize-sum`).textContent,
                    profit: document.getElementById(`${player}-profit`).textContent
                };
                
                // 收集下注金额
                const betAmounts = document.querySelectorAll(`tr:nth-child(2n+1) .bet-amount[data-player="${player}"]`);
                betAmounts.forEach(input => {
                    const date = input.getAttribute('data-date');
                    data.players[player].bets[date] = input.value || '0';
                });
                
                // 收集理论奖金
                const prizeAmounts = document.querySelectorAll(`tr:nth-child(2n) .prize-amount[data-player="${player}"]`);
                prizeAmounts.forEach(input => {
                    const date = input.getAttribute('data-date');
                    data.players[player].prizes[date] = input.value || '0';
                });
            });
            
            // 总净收益
            data.totalNet = document.getElementById('total-net').textContent;
            data.firstPlace = document.getElementById('firstPlaceDisplay').textContent;
            
            return data;
        }
        
        // 保存到 GitHub
        async function saveToGitHub() {
            // 使用内置的 Token
            const token = GITHUB_TOKEN;
            
            try {
                showStatus('⏳ 正在保存到云端...', 'loading');
                
                // 收集数据
                const data = collectTableData();
                const content = JSON.stringify(data, null, 2);
                
                // 先将内容转换为 base64
                const base64Content = btoa(unescape(encodeURIComponent(content)));
                
                // GitHub API URL
                const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DATA_FILE_PATH}`;
                
                // 先检查文件是否存在
                let sha = null;
                try {
                    const checkResponse = await fetch(apiUrl, {
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    
                    if (checkResponse.ok) {
                        const existingFile = await checkResponse.json();
                        sha = existingFile.sha;
                    }
                } catch (e) {
                    // 文件不存在，继续创建
                }
                
                // 准备请求数据
                const requestData = {
                    message: `更新数据 - ${new Date().toLocaleString('zh-CN')}`,
                    content: base64Content
                };
                
                if (sha) {
                    requestData.sha = sha;
                }
                
                // 发送请求到 GitHub API
                const response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '保存失败');
                }
                
                showStatus('✅ 数据已成功保存到云端！', 'success');
                
                // 不再保存 token 到本地存储，因为已内置
                
            } catch (error) {
                console.error('保存失败:', error);
                showStatus('❌ 保存失败：' + error.message, 'error');
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('load', function() {
            calculateTotals();
        });
        
        // 页面加载完成后初始化
        window.onload = function() {
            calculateTotals();
        };
    </script>
</body>
</html>
